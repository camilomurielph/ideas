<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
        <title>ideas</title>

        <!-- Icono iOS -->
        <link rel="icon" href="https://res.cloudinary.com/ddh8chtup/image/upload/v1782363757/icono_nuevo_1_xy0olo.png" />
        <link rel="apple-touch-icon" href="https://res.cloudinary.com/ddh8chtup/image/upload/v1782363757/icono_nuevo_1_xy0olo.png" />
        <link rel="apple-touch-icon-precomposed" href="https://res.cloudinary.com/ddh8chtup/image/upload/v1782363757/icono_nuevo_1_xy0olo.png" />
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

        <!-- Librerías externas -->
        <script src="https://cdn.jsdelivr.net/npm/marked@11.1.0/marked.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>

        <!-- Estilos -->
        <link rel="stylesheet" href="css/styles.css" />
    </head>
    <body>
        <!-- ===== TOAST ===== -->
        <div id="toast" class="toast"></div>

        <!-- ===== OVERLAY PARA CERRAR SIDEBAR ===== -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- ===== MODAL LOGIN ===== -->
        <div class="modal-overlay" id="loginModal">
            <div class="modal">
                <button class="close-modal" id="closeLoginModal">&times;</button>
                <h2 id="loginTitle">Iniciar sesión</h2>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="tu@email.com" />
                </div>
                <div class="field">
                    <label>Contraseña</label>
                    <input type="password" id="loginPassword" placeholder="••••••••" />
                </div>
                <div class="actions">
                    <button class="btn-primary" id="loginActionBtn">Iniciar sesión</button>
                    <button class="btn-secondary" id="loginToggleBtn">¿No tienes cuenta? Regístrate</button>
                </div>
                <div class="toggle-mode">
                    <span id="loginModeText">¿No tienes cuenta? <a id="loginToggleLink">Regístrate</a></span>
                </div>
            </div>
        </div>

        <!-- ===== MODAL NUEVA IDEA ===== -->
        <div class="modal-overlay modal-new-idea" id="newIdeaModal">
            <div class="modal">
                <button class="close-modal" id="closeNewIdeaModal">&times;</button>
                <h2>Nueva idea</h2>
                <div class="field">
                    <label>Título</label>
                    <input type="text" id="newIdeaTitle" placeholder="Mi idea..." />
                </div>
                <div class="field" style="position: relative;">
                    <label>Contenido (Markdown)</label>
                    <textarea id="newIdeaContent" placeholder="Pega aquí el contenido desarrollado por Gemini..."></textarea>
                    <button id="pasteFromClipboardBtn" class="btn-paste" style="display: none;">📋 Pegar</button>
                </div>
                <div class="actions">
                    <button class="btn-primary" id="saveIdeaBtn">Guardar idea</button>
                    <button class="btn-secondary" id="cancelNewIdeaBtn">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- ===== MODAL PARA VER/EDITAR IDEA ===== -->
        <div class="modal-overlay modal-idea" id="viewIdeaModal">
            <div class="modal modal-content">
                <button class="close-modal" id="closeViewIdeaModal">&times;</button>
                <div class="modal-header">
                    <h2 id="viewIdeaTitle">Título</h2>
                    <div class="actions">
                        <div class="dropdown">
                            <button class="btn-more" id="moreOptionsBtn">⋯</button>
                            <div class="dropdown-menu" id="dropdownMenu">
                                <button class="dropdown-item" id="editOptionBtn">✏️ Editar</button>
                                <button class="dropdown-item" id="deleteOptionBtn">🗑️ Eliminar</button>
                                <button class="dropdown-item" id="copyMdOptionBtn">📋 Copiar .md</button>
                                <button class="dropdown-item" id="copyPlainOptionBtn">📄 Copiar sin formato</button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-body" id="viewIdeaBody">
                    <div class="preview" id="viewIdeaPreview"></div>
                    <textarea id="viewIdeaEditor" style="display: none;"></textarea>
                </div>
                <div class="modal-footer" id="viewIdeaFooter" style="display: none;">
                    <button class="btn-cancel" id="cancelEditIdeaBtn">Cancelar</button>
                    <button class="btn-save" id="updateIdeaBtn">Actualizar</button>
                </div>
            </div>
        </div>

        <!-- ===== APP ===== -->
        <div class="app-container">
            <!-- SIDEBAR -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h2>📂 Mis ideas</h2>
                    <button class="btn-new-idea" id="newIdeaBtn">+ Nueva</button>
                </div>
                <div class="idea-list" id="ideaList">
                    <div style="color: rgba(255,255,255,0.2); text-align: center; padding: 2rem 0; font-size: 0.9rem;">
                        No hay ideas aún.<br />Crea tu primera idea.
                    </div>
                </div>
                <div class="sidebar-footer">
                    <span id="userEmailDisplay">usuario@email.com</span>
                    <button class="btn-logout" id="logoutBtn">Cerrar sesión</button>
                </div>
            </aside>

            <!-- MAIN -->
            <main class="main" id="mainContent">
                <div class="main-header">
                    <div class="left">
                        <button class="btn-hamburger" id="hamburgerBtn">☰</button>
                        <h1 id="mainTitle">🎙️ ideas</h1>
                    </div>
                    <div id="authSection">
                        <button class="btn-login" id="loginBtn">Iniciar sesión</button>
                    </div>
                </div>

                <!-- VISTA PRINCIPAL: MICRÓFONO -->
                <div class="mic-view" id="micView">
                    <div class="mic-container">
                        <button class="mic-btn" id="micBtn" title="Grabar / Detener">🎤</button>
                        <div class="mic-status" id="micStatus">Toca el micrófono para empezar</div>
                        <div class="mic-status small" id="helpText"></div>
                    </div>

                    <div class="transcript-area" id="transcriptArea">
                        <div class="label">📝 Transcripción</div>
                        <div class="content" id="transcriptContent"></div>
                    </div>

                    <div class="actions-row">
                        <div class="next-btn-container" id="nextBtnContainer">
                            <button class="btn-next" id="nextBtn">➡️ Siguiente</button>
                        </div>

                        <div class="next-btn-container" id="retryContainer" style="display: none;">
                            <button class="btn-retry" id="retryBtn">🔄 Reintentar</button>
                        </div>
                    </div>

                    <!-- Botón principal "Nueva idea" (visible solo en ciertos estados) -->
                    <div class="main-action-btn" id="newIdeaMainBtn" style="display: none;">
                        <button class="btn-primary btn-large">➕ Nueva idea</button>
                    </div>
                </div>
            </main>
        </div>

        <!-- ===== ÚNICO SCRIPT MODULAR ===== -->
        <script type="module" src="js/app.js"></script>
    </body>
</html>
